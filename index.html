<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>心の記録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEECE4;
    --bg-panel:#F8F6F0;
    --ink:#2B2A25;
    --ink-soft:#7A786D;
    --line:#DBD7C9;
    --low:#A8674F;
    --mid:#C9A227;
    --high:#6F8F71;
    --accent:#55738A;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Zen Kaku Gothic New', sans-serif;
    min-height:100vh;
    padding:20px 14px 60px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:520px;margin:0 auto;}

  header{margin-bottom:22px;}
  h1{
    font-family:'Shippori Mincho', serif;
    font-weight:700;
    font-size:26px;
    margin:0 0 4px;
    letter-spacing:.04em;
  }
  .sub{
    color:var(--ink-soft);
    font-size:12.5px;
    letter-spacing:.03em;
  }

  .panel{
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:16px;
  }

  /* --- month nav --- */
  .month-nav{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:12px;
  }
  .month-nav button{
    background:none;border:1px solid var(--line);
    width:32px;height:32px;border-radius:50%;
    font-size:15px;color:var(--ink);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s;
  }
  .month-nav button:hover{background:var(--line);}
  .month-label{
    font-family:'JetBrains Mono',monospace;
    font-size:15px;font-weight:600;letter-spacing:.03em;
  }

  /* --- calendar grid --- */
  .weekdays,.grid{
    display:grid;grid-template-columns:repeat(7,1fr);
    gap:4px;
  }
  .weekdays{margin-bottom:6px;}
  .weekdays span{
    text-align:center;font-size:11px;color:var(--ink-soft);
    font-family:'JetBrains Mono',monospace;
  }
  .day{
    position:relative;
    aspect-ratio:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-radius:9px;
    cursor:pointer;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    color:var(--ink);
    background:transparent;
    border:1px solid transparent;
    transition:border-color .15s, transform .1s;
  }
  .day.empty{cursor:default;}
  .day:not(.empty):hover{border-color:var(--ink-soft);}
  .day.selected{border-color:var(--ink);border-width:2px;}
  .day.today .num{text-decoration:underline;text-underline-offset:3px;}
  .dot{
    width:8px;height:8px;border-radius:50%;
    margin-top:2px;
    background:var(--line);
  }

  /* --- entry panel --- */
  .entry-date{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;color:var(--ink-soft);margin-bottom:10px;
  }
  .slider-row{
    display:flex;align-items:center;gap:12px;margin-bottom:14px;
  }
  input[type=range]{
    flex:1;-webkit-appearance:none;height:4px;border-radius:2px;
    background:linear-gradient(90deg,var(--low),var(--mid),var(--high));
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:18px;height:18px;border-radius:50%;
    background:var(--bg-panel);
    border:2px solid var(--ink);
    cursor:pointer;
  }
  .mood-val{
    font-family:'JetBrains Mono',monospace;
    font-size:20px;font-weight:600;
    width:34px;text-align:center;
  }
  textarea{
    width:100%;min-height:64px;resize:vertical;
    border:1px solid var(--line);border-radius:8px;
    background:#fff;color:var(--ink);
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-size:13.5px;padding:10px;
    margin-bottom:12px;
  }
  textarea:focus,input[type=range]:focus{outline:2px solid var(--accent);outline-offset:2px;}
  .row-btn{display:flex;gap:8px;}
  button.save{
    flex:1;
    background:var(--ink);color:var(--bg-panel);
    border:none;border-radius:8px;
    padding:10px;font-size:13.5px;font-weight:600;
    font-family:'Zen Kaku Gothic New',sans-serif;
    cursor:pointer;
  }
  button.save:active{transform:scale(.98);}
  button.clear{
    background:none;border:1px solid var(--line);
    border-radius:8px;padding:10px 14px;
    color:var(--ink-soft);font-size:13px;cursor:pointer;
  }
  .save-note{font-size:11.5px;color:var(--ink-soft);margin-top:8px;min-height:14px;}

  /* --- graph --- */
  .panel h2{
    font-family:'Shippori Mincho',serif;
    font-size:16px;margin:0 0 2px;
  }
  .range-toggle{
    display:flex;gap:6px;margin:8px 0 12px;
  }
  .range-toggle button{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;padding:4px 10px;border-radius:12px;
    border:1px solid var(--line);background:none;color:var(--ink-soft);
    cursor:pointer;
  }
  .range-toggle button.active{
    background:var(--ink);color:var(--bg-panel);border-color:var(--ink);
  }
  canvas{width:100%;display:block;}
  .empty-state{
    color:var(--ink-soft);font-size:13px;text-align:center;padding:30px 10px;
  }
  .legend{
    display:flex;justify-content:center;gap:16px;margin-top:10px;
    font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;
  }
  .legend span{display:flex;align-items:center;gap:5px;}
  .legend i{width:8px;height:8px;border-radius:50%;display:inline-block;}

  footer{text-align:center;font-size:11px;color:var(--ink-soft);margin-top:6px;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>心の記録</h1>
    <div class="sub">日々の気分をカレンダーに刻み、波として眺める</div>
  </header>

  <div class="panel">
    <div class="month-nav">
      <button id="prevMonth" aria-label="前の月">‹</button>
      <div class="month-label" id="monthLabel">----</div>
      <button id="nextMonth" aria-label="次の月">›</button>
    </div>
    <div class="weekdays">
      <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
    </div>
    <div class="grid" id="calGrid"></div>
  </div>

  <div class="panel" id="entryPanel">
    <div class="entry-date" id="entryDate">日付を選択してください</div>
    <div class="slider-row">
      <input type="range" id="moodSlider" min="1" max="10" value="5">
      <div class="mood-val" id="moodVal">5</div>
    </div>
    <textarea id="noteInput" placeholder="今日の出来事や気持ちをメモ（任意）"></textarea>
    <div class="row-btn">
      <button class="save" id="saveBtn">記録する</button>
      <button class="clear" id="clearBtn">削除</button>
    </div>
    <div class="save-note" id="saveNote"></div>
  </div>

  <div class="panel">
    <h2>バックアップ</h2>
    <div class="sub" style="margin-bottom:10px;">記録はこの端末に自動保存されますが、機種変更やブラウザの初期化に備えてファイルにも保存できます</div>
    <div class="row-btn">
      <button class="save" id="exportBtn">ファイルに保存</button>
      <button class="clear" id="importBtn">ファイルから読み込む</button>
    </div>
    <input type="file" id="importFile" accept="application/json" style="display:none;">
    <div class="save-note" id="backupNote"></div>
  </div>

  <div class="panel">
    <h2>気分の推移</h2>
    <div class="range-toggle">
      <button data-range="30" class="active">30日</button>
      <button data-range="90">90日</button>
      <button data-range="365">1年</button>
    </div>
    <div id="graphArea"></div>
    <div class="legend">
      <span><i style="background:var(--low)"></i>不調</span>
      <span><i style="background:var(--mid)"></i>普通</span>
      <span><i style="background:var(--high)"></i>好調</span>
    </div>
  </div>

  <footer>データはこの端末のブラウザ内に保存されます</footer>
</div>

<script>
const STORAGE_KEY = 'mood-entries';
let entries = {}; // { "YYYY-MM-DD": { mood: 1-10, note: "" } }
let currentMonth = new Date();
currentMonth.setDate(1);
let selectedDate = fmtDate(new Date());
let currentRange = 30;
let loaded = false;

function fmtDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function moodColor(v){
  // v: 1-10 -> low(clay) -> mid(gold) -> high(sage)
  const low=[168,103,79], mid=[201,162,39], high=[111,143,113];
  let t, c1, c2;
  if(v<=5.5){ t=(v-1)/4.5; c1=low; c2=mid; }
  else { t=(v-5.5)/4.5; c1=mid; c2=high; }
  t=Math.max(0,Math.min(1,t));
  const r=Math.round(c1[0]+(c2[0]-c1[0])*t);
  const g=Math.round(c1[1]+(c2[1]-c1[1])*t);
  const b=Math.round(c1[2]+(c2[2]-c1[2])*t);
  return `rgb(${r},${g},${b})`;
}

const hasCloudStorage = (typeof window.storage !== 'undefined' && window.storage !== null);

async function loadEntries(){
  // Try the in-app persistent storage first, then fall back to this browser's
  // localStorage so the app still saves when opened as a plain local file.
  try{
    if(hasCloudStorage){
      const res = await window.storage.get(STORAGE_KEY, false);
      entries = res ? JSON.parse(res.value) : {};
      return;
    }
  }catch(e){ /* key may not exist yet, fall through */ }
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : {};
  }catch(e){
    entries = {};
  }
}

async function persistEntries(){
  let ok = false;
  if(hasCloudStorage){
    try{
      const res = await window.storage.set(STORAGE_KEY, JSON.stringify(entries), false);
      ok = !!res;
    }catch(e){ ok = false; }
  }
  // Always mirror to localStorage as a safety net (also the primary path
  // when hasCloudStorage is false).
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    ok = true;
  }catch(e){ /* localStorage unavailable (e.g. private mode) */ }
  return ok;
}

function downloadBackup(){
  const blob = new Blob([JSON.stringify(entries, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = fmtDate(new Date());
  a.href = url;
  a.download = `mood-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function readBackupFile(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      try{ resolve(JSON.parse(reader.result)); }
      catch(e){ reject(e); }
    };
    reader.onerror = ()=>reject(reader.error);
    reader.readAsText(file);
  });
}

function renderCalendar(){
  const label = currentMonth.getFullYear()+'年 '+(currentMonth.getMonth()+1)+'月';
  document.getElementById('monthLabel').textContent = label;

  const grid = document.getElementById('calGrid');
  grid.innerHTML='';
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayStr = fmtDate(new Date());

  for(let i=0;i<firstDow;i++){
    const empty = document.createElement('div');
    empty.className='day empty';
    grid.appendChild(empty);
  }
  for(let d=1; d<=daysInMonth; d++){
    const dateObj = new Date(year, month, d);
    const dateStr = fmtDate(dateObj);
    const cell = document.createElement('div');
    cell.className='day';
    if(dateStr===todayStr) cell.classList.add('today');
    if(dateStr===selectedDate) cell.classList.add('selected');
    cell.innerHTML = `<span class="num">${d}</span>`;
    const dot = document.createElement('div');
    dot.className='dot';
    if(entries[dateStr]) dot.style.background = moodColor(entries[dateStr].mood);
    cell.appendChild(dot);
    cell.addEventListener('click', ()=>{ selectedDate = dateStr; renderCalendar(); renderEntryPanel(); });
    grid.appendChild(cell);
  }
}

function renderEntryPanel(){
  const d = new Date(selectedDate+'T00:00:00');
  const dow = ['日','月','火','水','木','金','土'][d.getDay()];
  document.getElementById('entryDate').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${dow}）`;

  const entry = entries[selectedDate];
  document.getElementById('moodSlider').value = entry ? entry.mood : 5;
  document.getElementById('moodVal').textContent = entry ? entry.mood : 5;
  document.getElementById('moodVal').style.color = moodColor(entry ? entry.mood : 5);
  document.getElementById('noteInput').value = entry ? (entry.note||'') : '';
  document.getElementById('saveNote').textContent='';
}

document.getElementById('moodSlider').addEventListener('input', (e)=>{
  document.getElementById('moodVal').textContent = e.target.value;
  document.getElementById('moodVal').style.color = moodColor(Number(e.target.value));
});

document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const mood = Number(document.getElementById('moodSlider').value);
  const note = document.getElementById('noteInput').value;
  entries[selectedDate] = { mood, note };
  const note_el = document.getElementById('saveNote');
  note_el.textContent = '保存中...';
  const ok = await persistEntries();
  note_el.textContent = ok ? '保存しました' : '保存に失敗しました。もう一度お試しください';
  renderCalendar();
  renderGraph();
});

document.getElementById('clearBtn').addEventListener('click', async ()=>{
  if(!entries[selectedDate]) return;
  delete entries[selectedDate];
  const ok = await persistEntries();
  document.getElementById('saveNote').textContent = ok ? '削除しました' : '削除に失敗しました';
  renderEntryPanel();
  renderCalendar();
  renderGraph();
});

document.getElementById('prevMonth').addEventListener('click', ()=>{
  currentMonth.setMonth(currentMonth.getMonth()-1);
  renderCalendar();
});
document.getElementById('nextMonth').addEventListener('click', ()=>{
  currentMonth.setMonth(currentMonth.getMonth()+1);
  renderCalendar();
});

document.querySelectorAll('.range-toggle button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.range-toggle button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentRange = Number(btn.dataset.range);
    renderGraph();
  });
});

function renderGraph(){
  const area = document.getElementById('graphArea');
  const today = new Date();
  const days = [];
  for(let i=currentRange-1; i>=0; i--){
    const d = new Date(today);
    d.setDate(d.getDate()-i);
    days.push(fmtDate(d));
  }
  const points = days.map(ds => entries[ds] ? entries[ds].mood : null);
  const hasData = points.some(p=>p!==null);

  if(!hasData){
    area.innerHTML = '<div class="empty-state">まだ記録がありません。<br>カレンダーから日付を選んで気分を記録してみましょう。</div>';
    return;
  }

  area.innerHTML = '<canvas id="chartCanvas"></canvas>';
  const canvas = document.getElementById('chartCanvas');
  const dpr = window.devicePixelRatio || 1;
  const cssWidth = area.clientWidth;
  const cssHeight = 190;
  canvas.style.height = cssHeight+'px';
  canvas.width = cssWidth*dpr;
  canvas.height = cssHeight*dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  const padL=26, padR=10, padT=14, padB=22;
  const w = cssWidth - padL - padR;
  const h = cssHeight - padT - padB;

  // grid lines (mood 1,5.5,10)
  ctx.strokeStyle = '#DBD7C9';
  ctx.lineWidth = 1;
  ctx.font = '10px JetBrains Mono, monospace';
  ctx.fillStyle = '#7A786D';
  [1,5.5,10].forEach(v=>{
    const y = padT + h - ((v-1)/9)*h;
    ctx.beginPath();
    ctx.moveTo(padL,y); ctx.lineTo(padL+w,y);
    ctx.stroke();
    ctx.fillText(String(v), 2, y+3);
  });

  // build coordinate list only for known points, connecting across gaps by index position
  const coords = points.map((v,i)=>{
    if(v===null) return null;
    const x = padL + (w * (i/(points.length-1||1)));
    const y = padT + h - ((v-1)/9)*h;
    return {x,y,v};
  });

  // draw line through consecutive known points
  ctx.strokeStyle = '#55738A';
  ctx.lineWidth = 2;
  ctx.lineJoin='round';
  ctx.beginPath();
  let started=false;
  coords.forEach(c=>{
    if(!c){ started=false; return; }
    if(!started){ ctx.moveTo(c.x,c.y); started=true; }
    else ctx.lineTo(c.x,c.y);
  });
  ctx.stroke();

  // dots
  coords.forEach(c=>{
    if(!c) return;
    ctx.beginPath();
    ctx.arc(c.x,c.y, currentRange>60?2:3.5, 0, Math.PI*2);
    ctx.fillStyle = moodColor(c.v);
    ctx.fill();
  });

  // x-axis date labels (first, middle, last)
  ctx.fillStyle = '#7A786D';
  ctx.font = '10px JetBrains Mono, monospace';
  const labelIdxs = [0, Math.floor((points.length-1)/2), points.length-1];
  labelIdxs.forEach(i=>{
    const ds = days[i];
    const short = ds.slice(5).replace('-','/');
    const x = padL + (w*(i/(points.length-1||1)));
    ctx.textAlign = i===0?'left':(i===points.length-1?'right':'center');
    ctx.fillText(short, x, cssHeight-6);
  });
  ctx.textAlign='left';
}

document.getElementById('exportBtn').addEventListener('click', ()=>{
  downloadBackup();
  document.getElementById('backupNote').textContent = 'バックアップファイルを保存しました';
});

document.getElementById('importBtn').addEventListener('click', ()=>{
  document.getElementById('importFile').click();
});

document.getElementById('importFile').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  const note = document.getElementById('backupNote');
  if(!file) return;
  try{
    const data = await readBackupFile(file);
    if(typeof data !== 'object' || data === null) throw new Error('invalid');
    entries = data;
    await persistEntries();
    renderCalendar();
    renderEntryPanel();
    renderGraph();
    note.textContent = '読み込みました';
  }catch(err){
    note.textContent = '読み込みに失敗しました。ファイルの形式を確認してください';
  }
  e.target.value = '';
});

window.addEventListener('resize', ()=>{ if(loaded) renderGraph(); });

async function init(){
  await loadEntries();
  loaded = true;
  renderCalendar();
  renderEntryPanel();
  renderGraph();
}
init();
</script>
</body>
</html>
